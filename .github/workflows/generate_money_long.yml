name: Generate Money Long

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *" # daily at 09:00 UTC

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      YOUTUBE_PRIVACY: ${{ secrets.YOUTUBE_PRIVACY }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core fonts-dejavu-extra

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          IMAGEIO_FFMPEG_EXE=/usr/bin/ffmpeg pip install -r requirements.txt

      - name: Collect video stats
        run: python -c "from analytics import fetch_and_update_stats, print_report; fetch_and_update_stats(); print_report()"

      - name: Generate long-form money video
        run: |
          python generate_money_long.py

      - name: Cleanup build files
        if: always()
        run: rm -rf build/

      - name: Commit performance & tracking data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add performance_log.json used_articles_long.json || true
          git diff --cached --quiet && exit 0
          git commit -m "analytics: update performance data"
          git pull --rebase -X theirs || (git checkout --theirs . && git add -A && git rebase --continue)
          git push || true
